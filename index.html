<!DOCTYPE html>
<html lang="da">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Side genopfriskning</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
    
    <!--HEADER NAVIGATION-->
        <header>
            <img src="" alt="logo">
            <nav>
                <ul>
                    <li><a href="Forside"></a></li>
                    <li><a href="Om"></a></li>
                    <li><a href="Services"></a></li>
                    <li><a href="Kontakt"></a></li>
                </ul>
            </nav>
        </header>

    <!--HERO-->
        <section class="hero">
            <div class="hero-content">
                <h1></h1>
                <p></p>
                <a href="#" class="btn">Kontakt os</a>
            </div>
        </section>
    
    <!--SERVICES-->
        <section class="services">
            <h2>Hvad skal vi hjælpe dig med?</h2>

            <div class="cards">
                <div class="Branding">
                    <img src="" alt="">
                    <h3>Branding</h3>
                    <p></p>
                    <a href="#">Læs mere om branding</a>
                </div>

                <div class="SEO">
                    <img src="" alt="">
                    <h3>SEO</h3>
                    <p></p>
                    <a href="#">Læs mere om SEO</a>
                </div>

                <div class="Hjemmeside">
                    <img src="" alt="">
                    <h3>Hjemmeside</h3>
                    <p></p>
                    <a href="#">Læs mere om hjemmeside</a>
                </div>
            </div>
        </section>

    <!--ABOUT TEKST + BILLEDE-->
        <section class="about">
            <div class="about-tekst">
                <h2>Vi går hele vejen med jer</h2>
                <p></p>
                <p></p>
                <p></p>
                <p></p>
                <a href="#">Læs mere om vores processarbejde</a>
            </div>

            <div class="about-image">
                <img src="#" alt="Møde med post-its">
            </div>
        </section>

    <!--KONTAKT FORMULAR-->
        <section class="Kontakt">
            <h2>Kontakt os</h2>

            <form>
                <input type="text" placeholder="Navn">
                <input type="email" placeholder="E-mail">
                <input type="text" placeholder="Telefon">
                <select>
                    <option>Emne</option>
                    <option>Branding</option>
                    <option>SEO</option>
                    <option>Hjemmeside</option>
                </select>
                <textarea placeholder="Besked"></textarea>
                <button type="submit">Send besked</button>
            </form>
        </section>

    <!--Footer-->
        <footer>
            <div class="footer-info">
                <h3>Info</h3>
                <p>Branding Co</p>
                <p>Kongensgade 1</p>
                <p>5000 Odense</p>
                <p>Tlf: 11 22 33 44</p>
            </div>

            <div class="footer-logo">
                <p>Branding.co</p>
            </div>
        </footer>
        
    </body>
</html>
